name: Revision de Sintaxis PHP

on:
  pull_request:
    branches: [ main ]

jobs:
  check-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs

      - name: Revisar errores de sintaxis (Lint)
        run: |
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Revisar estilo de codigo
        run: |
          echo "Revisando que el codigo este limpio..."
