name: Revision Laravel 12

on:
  pull_request:
    branches: [ main ] # Solo se activa cuando alguien quiere entrar a main

jobs:
  tests-and-lint:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, libxml, mysql, bcmath
          tools: composer:v2

      - name: Instalar Dependencias
        run: composer install --prefer-dist --no-progress

      - name: Preparar Entorno
        run: |
          cp .env.example .env
          php artisan key:generate
          
      - name: Ejecutar Migraciones y Tests
        env:
          DB_CONNECTION: mysql
          DB_DATABASE: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: php artisan migrate --force && php artisan test
